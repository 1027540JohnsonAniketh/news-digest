services:
  - type: web
    name: news-digest
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: CURRENTS_API_KEY
        sync: false          # You'll paste this in Render dashboard
      - key: GUARDIAN_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
